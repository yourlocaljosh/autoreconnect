plugins {
    id 'net.fabricmc.fabric-loom' version '1.15-SNAPSHOT'  // confirm current version on Fabric Develop
    id 'maven-publish'
}

version = project.mod_version
group   = project.maven_group
base { archivesName = project.archives_base_name }

loom {
    splitEnvironmentSourceSets()

    mods {
        "autoreconnect" {
            sourceSet sourceSets.main
            sourceSet sourceSets.client
        }
    }
}

dependencies {
    minecraft "com.mojang:minecraft:${project.minecraft_version}"
    // No `mappings` line: 26.1+ is unobfuscated, so there is nothing to remap.
    implementation "net.fabricmc:fabric-loader:${project.loader_version}"
    implementation "net.fabricmc.fabric-api:fabric-api:${project.fabric_version}"
}

processResources {
    inputs.property "version", project.version
    filesMatching("fabric.mod.json") { expand "version": project.version }
}

tasks.withType(JavaCompile).configureEach { it.options.release = 25 }

java {
    sourceCompatibility = JavaVersion.VERSION_25
    targetCompatibility = JavaVersion.VERSION_25
    withSourcesJar()
}